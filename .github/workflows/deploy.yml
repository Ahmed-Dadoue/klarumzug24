# =============================================================================
# Klarumzug24 – GitHub Actions Deployment
# =============================================================================
# Deploys to production VPS on push to main branch.
#
# Required GitHub Secrets:
#   SERVER_HOST        – VPS IP or hostname (e.g. 123.45.67.89)
#   SERVER_USER        – SSH user (e.g. root or deploy)
#   SERVER_SSH_KEY     – Private SSH key for authentication
#   SERVER_PORT        – SSH port (optional, default 22)
#   SERVER_FINGERPRINT – Server SSH fingerprint (ssh-keyscan output)
#                        Get it with: ssh-keyscan -H YOUR_SERVER_IP
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [main]

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "::error::SECRET SERVER_HOST is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "::error::SECRET SERVER_SSH_KEY is not set"
            exit 1
          fi
          echo "All required secrets are configured ✓"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER || 'root' }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          fingerprint: ${{ secrets.SERVER_FINGERPRINT }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            echo "=== Klarumzug24 Deployment ==="
            echo "Triggered by: ${{ github.actor }}"
            echo "Commit: ${{ github.sha }}"

            cd /opt/klarumzug24

            # Run the deploy script
            bash deploy.sh

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER || 'root' }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          fingerprint: ${{ secrets.SERVER_FINGERPRINT }}
          command_timeout: 2m
          script: |
            set -euo pipefail
            echo "=== Post-Deployment Verification ==="

            # Check systemd service
            echo "Service status:"
            systemctl is-active klarumzug24-api

            # Health check
            echo "Health check:"
            curl -sf http://127.0.0.1:8000/health | head -c 200
            echo ""

            # Show current commit
            echo "Active commit:"
            cd /opt/klarumzug24 && git log --oneline -1

            echo ""
            echo "=== Deployment verified ✓ ==="

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
